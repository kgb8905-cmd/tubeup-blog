baseURL: "http://blog.tubeup.kr/"
languageCode: "ko-kr"
defaultContentLanguage: "ko"
title: "TubeUp 블로그"
theme: "stack"
publishDir: "docs"

enableRobotsTXT: true

DefaultContentLanguage: ko
hasCJKLanguage: true

services:
  disqus:
    shortname: ""
  googleAnalytics:
    id: ""

permalinks:
  post: /posts/:slug/
  page: /:slug/

params:
  mainSections:
    - posts
  featuredImageField: image
  rssFullContent: true
  favicon: "img/favicon.png"

  footer:
    since: 2026
    customText: "유튜브 자동화·AI 영상 노하우"

  dateFormat:
    published: 2006-01-02
    lastUpdated: 2006-01-02 15:04

  sidebar:
    emoji: 🎬
    subtitle: "유튜브 크리에이터를 위한 AI 자동화 노하우. 떡상 영상 발굴부터 AI 대본·TTS·자막·렌더링까지."
    avatar: "img/tubeup-logo.png"

  article:
    math: false
    toc: true
    readingTime: true
    license:
      enabled: false
      default: "Licensed under CC BY-NC-SA 4.0"

  comments:
    enabled: false

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
    page:
      - type: toc

  opengraph:
    twitter:
      site: ""
      card: summary_large_image

  defaultImage:
    opengraph:
      enabled: true
      local: true
      src: "img/og-image.png"

  colorScheme:
    toggle: true
    default: auto

  imageProcessing:
    cover:
      enabled: true
    content:
      enabled: true

menu:
  main: []
  social:
    - identifier: tubeup
      name: TubeUp 사이트
      url: https://tubeup.kr/
      params:
        icon: link
    - identifier: rss
      name: RSS
      url: /index.xml
      params:
        icon: rss

related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 200

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
